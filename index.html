<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Coach Nikos — Strength &amp; Performance Hub</title>

<!-- PWA -->
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#e74c3c">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Coach Nikos">
<link rel="apple-touch-icon" href="/icon-192.png">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0a0a0a;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .bg-overlay {
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 50% 0%, rgba(100, 15, 15, 0.55) 0%, transparent 60%),
      radial-gradient(ellipse at 50% 100%, rgba(40, 10, 10, 0.3) 0%, transparent 60%),
      #0a0a0a;
    z-index: 0;
    pointer-events: none;
  }

  .content-wrapper {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    padding: 32px 24px 20px;
    text-align: center;
    border-bottom: 1px solid rgba(160, 30, 30, 0.35);
  }

  .logo-box {
    display: inline-block;
    border: 2px solid #c0392b;
    border-radius: 12px;
    padding: 14px 56px;
    background: linear-gradient(180deg, rgba(130, 18, 18, 0.45) 0%, rgba(35, 5, 5, 0.7) 100%);
    box-shadow: 0 0 40px rgba(200, 40, 40, 0.18), inset 0 0 24px rgba(140, 15, 15, 0.12);
    margin-bottom: 16px;
  }

  .logo-box h1 {
    font-size: 26px;
    font-weight: 900;
    color: #e74c3c;
    letter-spacing: 5px;
    text-transform: uppercase;
  }

  .hub-title {
    font-size: 20px;
    font-weight: 800;
    letter-spacing: 5px;
    color: #fff;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .hub-subtitle {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 4px;
    color: #777;
    text-transform: uppercase;
  }

  /* ── Main ── */
  main {
    flex: 1;
    max-width: 780px;
    margin: 0 auto;
    width: 100%;
    padding: 40px 24px 60px;
  }

  /* ── Step progress bar ── */
  .progress-wrap {
    margin-bottom: 44px;
  }

  .progress-label {
    text-align: center;
    font-size: 15px;
    letter-spacing: 4px;
    color: #666;
    text-transform: uppercase;
    font-weight: 900;
    margin-bottom: 12px;
  }

  .progress-label span { color: #e74c3c; }

  .progress-segments {
    display: flex;
    gap: 5px;
  }

  .progress-segment {
    flex: 1;
    height: 4px;
    border-radius: 2px;
    background: #1e1e1e;
    transition: background 0.35s, box-shadow 0.35s;
  }

  .progress-segment.done {
    background: #c0392b;
  }

  .progress-segment.current {
    background: #e74c3c;
    box-shadow: 0 0 10px rgba(231, 76, 60, 0.7);
  }

  /* ── Back link ── */
  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: #888;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    margin-bottom: 32px;
    padding: 9px 18px;
    background: #181818;
    border: 1px solid #2a2a2a;
    border-radius: 50px;
    user-select: none;
    transition: background 0.2s, border-color 0.2s, color 0.2s;
  }
  .back-link:hover { background: #222; border-color: #3a3a3a; color: #ccc; }

  /* ── Step headings ── */
  .step-title {
    font-size: 30px;
    font-weight: 800;
    margin-bottom: 8px;
    line-height: 1.2;
  }

  .step-subtitle {
    color: #888;
    font-size: 15px;
    margin-bottom: 36px;
  }

  /* ── 2-column card grid ── */
  .card-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }

  .big-card {
    background: #181818;
    border: 2px solid transparent;
    border-radius: 16px;
    padding: 44px 24px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    user-select: none;
  }

  /* 3-column card grid */
  .card-grid-3 { grid-template-columns: 1fr 1fr 1fr; }
  .card-grid-3 .big-card { padding: 32px 16px; }
  .card-grid-3 .big-card .card-icon { font-size: 40px; margin-bottom: 12px; }

  .big-card:hover { border-color: #e74c3c; background: #1f1f1f; }

  .big-card .card-icon { font-size: 52px; margin-bottom: 16px; }

  .big-card .card-title {
    font-size: 18px;
    font-weight: 900;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .big-card .card-sub {
    font-size: 11px;
    color: #555;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* ── Lift list ── */
  .lift-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .lift-item {
    background: #161616;
    border: 1px solid #242424;
    border-radius: 12px;
    padding: 18px 22px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    font-weight: 600;
    font-size: 15px;
    transition: background 0.15s, border-color 0.15s;
    user-select: none;
  }

  .lift-item:hover { background: #1e1e1e; border-color: #3a3a3a; }

  .lift-arrow { color: #e74c3c; font-size: 18px; }

  /* ── Input card ── */
  .input-card {
    background: #161616;
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 0;
  }

  .input-label {
    font-size: 11px;
    letter-spacing: 2px;
    color: #666;
    text-transform: uppercase;
    margin-bottom: 12px;
    font-weight: 700;
  }

  .unit-toggle {
    display: flex;
    margin-bottom: 28px;
  }

  .unit-btn {
    padding: 13px 28px;
    border: none;
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.2s;
    background: #252525;
    color: #555;
  }

  .unit-btn:first-child { border-radius: 10px 0 0 10px; }
  .unit-btn:last-child  { border-radius: 0 10px 10px 0; }
  .unit-btn.active { background: #e74c3c; color: #fff; box-shadow: 0 4px 14px rgba(231,76,60,0.35); }

  .inputs-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
  }

  .input-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .num-input {
    width: 100%;
    background: #202020;
    border: 1px solid #2e2e2e;
    border-radius: 10px;
    padding: 16px 12px;
    text-align: center;
    color: #fff;
    font-size: 22px;
    font-weight: 700;
    outline: none;
    transition: border-color 0.2s;
    -moz-appearance: textfield;
  }

  .num-input::-webkit-outer-spin-button,
  .num-input::-webkit-inner-spin-button { -webkit-appearance: none; }

  .num-input:focus { border-color: #e74c3c; }
  .num-input::placeholder { color: #383838; }

  .input-unit-label {
    font-size: 11px;
    letter-spacing: 2px;
    color: #555;
    text-transform: uppercase;
    font-weight: 600;
  }

  .or-divider {
    display: flex;
    align-items: center;
    gap: 16px;
    margin: 22px 0;
    color: #444;
    font-size: 13px;
    letter-spacing: 1px;
  }

  .or-divider::before,
  .or-divider::after { content: ''; flex: 1; height: 1px; background: #272727; }

  .direct-link {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #161616;
    border: 1px solid #2a2a2a;
    border-radius: 12px;
    padding: 16px 20px;
    margin-bottom: 16px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
  }

  .direct-link:hover { border-color: #e74c3c; background: #1a1a1a; }

  .direct-link-text {
    color: #888;
    font-size: 14px;
  }

  .direct-link-text strong { color: #fff; font-weight: 700; }

  .direct-link a {
    color: #e74c3c;
    cursor: pointer;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }

  .calc-btn {
    width: 100%;
    background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
    color: #fff;
    border: none;
    border-radius: 50px;
    padding: 22px 32px;
    font-size: 14px;
    font-weight: 900;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 4px;
    box-shadow: 0 6px 24px rgba(231, 76, 60, 0.4), 0 2px 8px rgba(0,0,0,0.3);
  }

  .calc-btn:hover {
    background: linear-gradient(135deg, #ff5c4d 0%, #e74c3c 100%);
    box-shadow: 0 8px 32px rgba(231, 76, 60, 0.55), 0 2px 8px rgba(0,0,0,0.3);
    transform: translateY(-1px);
  }

  /* ── Results ── */
  .result-lift-name {
    text-align: center;
    font-size: 12px;
    letter-spacing: 5px;
    color: #666;
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .result-1rm {
    text-align: center;
    line-height: 1;
    margin-bottom: 8px;
  }

  .result-1rm .big-num {
    font-size: 96px;
    font-weight: 900;
    color: #e74c3c;
  }

  .result-1rm .unit-tag {
    font-size: 34px;
    font-weight: 700;
    color: #e74c3c;
  }

  .result-1rm-label {
    text-align: center;
    font-size: 11px;
    letter-spacing: 4px;
    color: #666;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .result-1rm-note {
    text-align: center;
    font-size: 13px;
    color: #555;
    margin-bottom: 28px;
  }

  .divider { height: 1px; background: #1e1e1e; margin: 24px 0; }

  /* ── Training zones ── */
  .zones-card {
    background: #111;
    border-radius: 16px;
    padding: 24px 28px;
    margin-bottom: 36px;
  }

  .zones-title {
    font-size: 11px;
    letter-spacing: 3px;
    color: #555;
    text-transform: uppercase;
    margin-bottom: 16px;
    font-weight: 700;
  }

  .zone-row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 0;
    border-bottom: 1px solid #1a1a1a;
  }

  .zone-row:last-child { border-bottom: none; }

  .zone-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  .zone-pct { font-size: 15px; font-weight: 800; min-width: 42px; }

  .zone-reps { font-size: 12px; color: #666; min-width: 68px; font-weight: 600; letter-spacing: 0.5px; }

  .zone-weight { font-size: 17px; font-weight: 800; min-width: 90px; }

  .zone-name { font-size: 14px; color: #999; }

  /* ── 6-week cycle ── */
  .cycle-heading { font-size: 22px; font-weight: 800; margin-bottom: 4px; }

  .cycle-sub { font-size: 13px; color: #555; margin-bottom: 20px; }

  .week-cards { display: flex; flex-direction: column; gap: 8px; margin-bottom: 32px; }

  .week-card {
    background: #161616;
    border: 1px solid #242424;
    border-radius: 12px;
    padding: 20px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .week-card.hl-red  { border-color: #7f1d1d; background: rgba(127,29,29,0.14); }
  .week-card.hl-green { border-color: #14532d; background: rgba(20,83,45,0.18); }

  .week-left { display: flex; align-items: center; gap: 20px; }

  .week-num-col { text-align: center; min-width: 28px; }

  .week-label { font-size: 9px; letter-spacing: 1px; color: #444; text-transform: uppercase; font-weight: 700; }

  .week-num-val { font-size: 15px; font-weight: 900; color: #777; }

  .week-scheme { font-size: 20px; font-weight: 900; }

  .scheme-small { font-size: 12px; font-weight: 500; color: #777; }

  .week-desc { font-size: 13px; color: #555; margin-top: 3px; }

  .week-right { text-align: right; }

  .week-weight { font-size: 20px; font-weight: 900; color: #e74c3c; }

  .week-weight.green { color: #22c55e; }

  .week-pct { font-size: 12px; color: #555; margin-top: 3px; }

  /* ── Action buttons ── */
  .action-buttons {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .btn-print {
    background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
    color: #fff;
    border: none;
    border-radius: 50px;
    padding: 20px;
    font-size: 13px;
    font-weight: 900;
    letter-spacing: 1.5px;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 18px rgba(245,158,11,0.4);
  }

  .btn-print:hover {
    background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
    box-shadow: 0 6px 24px rgba(245,158,11,0.55);
    transform: translateY(-1px);
  }

  .btn-new {
    background: #1e1e1e;
    color: #ddd;
    border: 1px solid #383838;
    border-radius: 50px;
    padding: 20px;
    font-size: 13px;
    font-weight: 900;
    letter-spacing: 1.5px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-new:hover { background: #282828; border-color: #505050; color: #fff; transform: translateY(-1px); }

  /* ── Search ── */
  .search-section {
    margin-top: 32px;
    background: #141414;
    border: 1px solid #2a2a2a;
    border-radius: 16px;
    padding: 28px 28px 24px;
    position: relative;
    overflow: hidden;
  }

  .search-section::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, #e74c3c 40%, #e74c3c 60%, transparent);
    opacity: 0.7;
  }

  .search-label {
    font-size: 14px;
    color: #aaa;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .search-label strong { color: #fff; font-weight: 700; }

  .search-label .search-icon {
    font-size: 16px;
    opacity: 0.8;
  }

  .search-input {
    width: 100%;
    background: #1e1e1e;
    border: 1px solid #333;
    border-radius: 10px;
    padding: 15px 20px;
    color: #fff;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .search-input:focus {
    border-color: #e74c3c;
    box-shadow: 0 0 0 3px rgba(231, 76, 60, 0.12);
  }

  .search-input::placeholder { color: #444; }

  .search-results {
    margin-top: 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-height: 320px;
    overflow-y: auto;
  }

  .no-results {
    text-align: center;
    color: #555;
    font-size: 14px;
    padding: 18px;
    background: #1a1a1a;
    border-radius: 10px;
  }

  .search-tag {
    font-size: 11px;
    color: #555;
    letter-spacing: 1px;
    text-transform: uppercase;
    font-weight: 600;
  }

  /* ── Section headings ── */
  .section-heading { font-size: 20px; font-weight: 800; margin-bottom: 4px; }
  .section-sub { font-size: 13px; color: #555; margin-bottom: 20px; }

  /* ── Training systems grid ── */
  .systems-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 28px;
  }

  .system-card {
    background: #111;
    border: 1px solid #242424;
    border-radius: 14px;
    overflow: hidden;
  }

  .system-card-header {
    padding: 12px 16px;
    border-bottom: 1px solid #1e1e1e;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .system-color-bar {
    width: 3px;
    height: 28px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  .system-name {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .system-desc {
    font-size: 10px;
    color: #555;
    margin-top: 2px;
    letter-spacing: 1px;
  }

  .system-set-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 16px;
    border-bottom: 1px solid #181818;
    font-size: 13px;
  }

  .system-set-row:last-child { border-bottom: none; }
  .set-label { color: #555; font-size: 11px; min-width: 36px; }
  .set-reps { color: #777; font-size: 12px; }
  .set-weight { font-weight: 800; font-size: 14px; }

  /* ── Programme tabs ── */
  .prog-tabs {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 24px;
  }

  .prog-tab {
    padding: 14px 16px;
    border-radius: 12px;
    border: 1px solid #2a2a2a;
    background: #181818;
    color: #666;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    user-select: none;
    text-align: center;
  }

  .prog-tab:hover { border-color: #444; color: #bbb; background: #222; }
  .prog-tab.active {
    background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
    border-color: #e74c3c;
    color: #fff;
    box-shadow: 0 4px 14px rgba(231,76,60,0.4);
  }

  /* ── Programme weeks ── */
  .prog-week {
    background: #111;
    border: 1px solid #242424;
    border-radius: 12px;
    margin-bottom: 10px;
    overflow: hidden;
  }

  .prog-week.pw-red  { border-color: #7f1d1d; background: rgba(127,29,29,0.12); }
  .prog-week.pw-green { border-color: #14532d; background: rgba(20,83,45,0.15); }

  .prog-week-header {
    padding: 12px 20px;
    background: rgba(255,255,255,0.03);
    border-bottom: 1px solid #1e1e1e;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .prog-week-num {
    font-size: 10px;
    letter-spacing: 2px;
    color: #444;
    text-transform: uppercase;
    font-weight: 700;
  }

  .prog-week-label { font-size: 13px; font-weight: 700; color: #999; }

  .prog-set-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 20px;
    border-bottom: 1px solid #181818;
    font-size: 14px;
  }

  .prog-set-row:last-child { border-bottom: none; }
  .prog-set-label { color: #555; font-size: 12px; min-width: 48px; }
  .prog-set-reps { color: #888; }
  .prog-set-weight { font-weight: 800; color: #e74c3c; font-size: 15px; }
  .prog-set-weight.green { color: #22c55e; }

  /* ── Weeks picker ── */
  .weeks-picker {
    background: #141414;
    border: 1px solid #2a2a2a;
    border-radius: 14px;
    padding: 20px 24px;
    margin-bottom: 24px;
    text-align: center;
  }

  .weeks-picker-label {
    font-size: 13px;
    color: #888;
    margin-bottom: 16px;
    line-height: 1.5;
  }

  .weeks-picker-label strong { color: #fff; }

  .weeks-picker-controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    margin-bottom: 12px;
  }

  .weeks-btn {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: 1px solid #333;
    background: #222;
    color: #fff;
    font-size: 22px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    line-height: 1;
  }

  .weeks-btn:hover { background: #e74c3c; border-color: #e74c3c; }

  .weeks-display {
    font-size: 36px;
    font-weight: 900;
    color: #e74c3c;
    min-width: 80px;
  }

  .weeks-display-unit {
    font-size: 14px;
    color: #555;
    font-weight: 600;
    letter-spacing: 1px;
    margin-top: 4px;
  }

  .weeks-picker-note {
    font-size: 11px;
    color: #444;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* ── YouTube demo button ── */
  .yt-demo-btn {
    display: flex;
    align-items: center;
    gap: 16px;
    background: #111;
    border: 1px solid #2a2a2a;
    border-radius: 16px;
    padding: 20px 24px;
    margin-bottom: 24px;
    text-decoration: none;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s, background 0.2s;
  }

  .yt-demo-btn::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, #ff0000 40%, #ff0000 60%, transparent);
    opacity: 0.6;
  }

  .yt-demo-btn:hover { border-color: #ff0000; background: #161616; }

  .yt-demo-icon {
    width: 52px;
    height: 52px;
    background: #ff0000;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    color: #fff;
    flex-shrink: 0;
    box-shadow: 0 4px 14px rgba(255,0,0,0.3);
    transition: box-shadow 0.2s;
  }

  .yt-demo-btn:hover .yt-demo-icon { box-shadow: 0 6px 20px rgba(255,0,0,0.5); }

  .yt-demo-text { flex: 1; }

  .yt-demo-title {
    font-size: 15px;
    font-weight: 800;
    color: #fff;
    margin-bottom: 3px;
  }

  .yt-demo-sub {
    font-size: 12px;
    color: #555;
    letter-spacing: 0.5px;
  }

  .yt-demo-arrow { color: #444; font-size: 20px; font-weight: 700; transition: color 0.2s; }
  .yt-demo-btn:hover .yt-demo-arrow { color: #ff0000; }

  /* ── Copy to notes ── */
  .copy-notes-card {
    background: #0e0e0e;
    border: 1px solid #2a2a2a;
    border-radius: 16px;
    padding: 24px 28px;
    margin-top: 24px;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }

  .copy-notes-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, #f59e0b 40%, #f59e0b 60%, transparent);
    opacity: 0.7;
  }

  .copy-notes-title {
    font-size: 14px;
    font-weight: 800;
    color: #fff;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .copy-notes-sub {
    font-size: 12px;
    color: #555;
    margin-bottom: 16px;
    line-height: 1.5;
  }

  .copy-preview {
    background: #141414;
    border: 1px solid #222;
    border-radius: 10px;
    padding: 14px 16px;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    color: #666;
    line-height: 1.8;
    white-space: pre-wrap;
    max-height: 160px;
    overflow-y: auto;
    margin-bottom: 14px;
  }

  .btn-copy {
    width: 100%;
    background: linear-gradient(135deg, #22863a 0%, #176328 100%);
    color: #fff;
    border: none;
    border-radius: 50px;
    padding: 18px;
    font-size: 13px;
    font-weight: 900;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 18px rgba(34,134,58,0.3);
  }

  .btn-copy:hover {
    background: linear-gradient(135deg, #2ea84a 0%, #22863a 100%);
    box-shadow: 0 6px 24px rgba(34,134,58,0.45);
    transform: translateY(-1px);
  }

  .btn-copy.copied {
    background: linear-gradient(135deg, #166534 0%, #14532d 100%);
    box-shadow: 0 4px 18px rgba(22,101,52,0.4);
  }

  /* ── Error ── */
  .err-msg {
    color: #e74c3c;
    font-size: 13px;
    margin-top: 10px;
    min-height: 20px;
  }

  /* ── Video library button (step 1) ── */
  .library-banner {
    margin-top: 24px;
    background: #0e0e0e;
    border: 1px solid #2a2a2a;
    border-radius: 16px;
    padding: 22px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s, background 0.2s;
    user-select: none;
  }

  .library-banner::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, #e74c3c 40%, #e74c3c 60%, transparent);
    opacity: 0.6;
  }

  .library-banner:hover { border-color: #e74c3c; background: #141414; }

  .library-banner-left { display: flex; align-items: center; gap: 16px; }

  .library-play-icon {
    width: 52px; height: 52px;
    background: linear-gradient(135deg, #e74c3c, #c0392b);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
    box-shadow: 0 4px 14px rgba(231,76,60,0.35);
  }

  .library-banner-title {
    font-size: 15px;
    font-weight: 800;
    color: #fff;
    margin-bottom: 3px;
  }

  .library-banner-sub {
    font-size: 12px;
    color: #555;
    letter-spacing: 1px;
  }

  .library-banner-arrow { color: #e74c3c; font-size: 20px; font-weight: 700; }

  /* ── Video library pages ── */
  .lib-category-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  .lib-cat-card {
    background: #111;
    border: 1px solid #242424;
    border-radius: 14px;
    padding: 20px 18px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    user-select: none;
  }

  .lib-cat-card:hover { border-color: #e74c3c; background: #161616; }

  .lib-cat-icon { font-size: 28px; margin-bottom: 10px; }

  .lib-cat-title {
    font-size: 13px;
    font-weight: 800;
    color: #fff;
    margin-bottom: 5px;
    letter-spacing: 0.5px;
  }

  .lib-cat-desc { font-size: 11px; color: #555; line-height: 1.5; }

  .lib-cat-count {
    font-size: 10px;
    color: #e74c3c;
    font-weight: 700;
    letter-spacing: 1px;
    margin-top: 10px;
    text-transform: uppercase;
  }

  .lib-video-list { display: flex; flex-direction: column; gap: 8px; }

  .lib-video-item {
    background: #111;
    border: 1px solid #222;
    border-radius: 12px;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    text-decoration: none;
    transition: border-color 0.2s, background 0.2s;
  }

  .lib-video-item:hover { border-color: #e74c3c; background: #161616; }

  .lib-video-play {
    width: 36px; height: 36px;
    background: #1e1e1e;
    border: 1px solid #333;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    flex-shrink: 0;
    transition: background 0.2s, border-color 0.2s;
  }

  .lib-video-item:hover .lib-video-play { background: #e74c3c; border-color: #e74c3c; }

  .lib-video-title {
    font-size: 14px;
    font-weight: 600;
    color: #ddd;
    flex: 1;
    line-height: 1.4;
  }

  .lib-video-arrow { color: #444; font-size: 16px; }
  .lib-video-item:hover .lib-video-arrow { color: #e74c3c; }

  /* ── Footer ── */
  footer {
    text-align: center;
    padding: 22px;
    border-top: 1px solid #141414;
    font-size: 11px;
    letter-spacing: 3px;
    color: #666;
    text-transform: uppercase;
    position: relative;
    z-index: 1;
  }

  /* ── Print ── */
  @media print {
    .bg-overlay { display: none; }
    body { background: #fff; color: #000; }
    header { border-bottom: 2px solid #e74c3c; }
    .logo-box { background: none; box-shadow: none; border-color: #e74c3c; }
    .logo-box h1 { color: #c0392b; }
    .hub-title { color: #000; }
    .hub-subtitle { color: #888; }
    .back-link, .action-buttons { display: none !important; }
    .zones-card { background: #f5f5f5; border-radius: 8px; }
    .week-card { border: 1px solid #ccc; background: #fff; }
    .week-card.hl-red { border-color: #c0392b; background: #fff5f5; }
    .week-card.hl-green { border-color: #166534; background: #f0fff4; }
    .result-1rm .big-num, .result-1rm .unit-tag { color: #c0392b; }
    .week-weight { color: #c0392b; }
    .zone-name { color: #444; }
    .progress-wrap { display: none; }
  }

  /* ── Mobile / PWA improvements ── */
  @media (max-width: 600px) {
    header { padding: 20px 16px 14px; }

    .logo-box { padding: 10px 20px; }
    .logo-box h1 { font-size: 18px; letter-spacing: 3px; }

    .hub-title { font-size: 13px; letter-spacing: 2px; }
    .hub-subtitle { font-size: 10px; letter-spacing: 2px; }

    main { padding: 24px 16px 80px; }

    .card-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
    .big-card { padding: 28px 14px; }
    .big-card .card-icon { font-size: 36px; margin-bottom: 10px; }
    .big-card .card-title { font-size: 14px; letter-spacing: 1px; }

    .card-grid-3 { grid-template-columns: 1fr; }
    .card-grid-3 .big-card { padding: 20px 18px; display: flex; align-items: center; gap: 14px; text-align: left; }
    .card-grid-3 .big-card .card-icon { font-size: 32px; margin-bottom: 0; }

    .systems-grid { grid-template-columns: 1fr; }

    .prog-tabs { grid-template-columns: 1fr 1fr; }

    .action-buttons { grid-template-columns: 1fr; }

    .step-title { font-size: 22px; }

    .inputs-row { grid-template-columns: 1fr 1fr; }

    .result-1rm .big-num { font-size: 72px; }

    .weeks-picker-controls { gap: 14px; }
    .weeks-display { font-size: 28px; }

    .lib-category-grid { grid-template-columns: 1fr; }

    .progress-label { font-size: 13px; }
  }

  /* Safe area insets for notched phones */
  body {
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }

</style>
</head>

// ── Exercise Demo — dynamic fetch from wger.de open API ──
async function loadExerciseDemo() {
  const container = document.getElementById('exerciseDemoContent');
  if (!container) return;

  const liftName = state.lift;

  // When running as a local file:// the browser blocks cross-origin fetch() calls.
  // corsproxy.io adds the required CORS headers so it works both locally and hosted.
  // Once you host this file on a web server you can remove the proxy prefix.
  const PROXY = 'https://corsproxy.io/?';

  async function apiFetch(url) {
    // Try direct first (works when hosted online), fall back to proxy
    try {
      const r = await fetch(url, { mode: 'cors' });
      if (r.ok) return r.json();
    } catch (_) {}
    // Proxy path — works when running locally via file://
    const r2 = await fetch(PROXY + encodeURIComponent(url));
    if (!r2.ok) throw new Error(`proxy fetch failed: ${r2.status}`);
    return r2.json();
  }

  try {
    // Step 1: search for the exercise by name
    const searchData = await apiFetch(
      `https://wger.de/api/v2/exercise/search/?term=${encodeURIComponent(liftName)}&language=english&format=json`
    );

    const suggestions = searchData.suggestions;
    if (!suggestions || suggestions.length === 0) throw new Error('no suggestions');

    // Pick first result's base_id
    let baseId = null;
    for (const s of suggestions) {
      const id = s.data && s.data.base_id != null ? s.data.base_id : s.base_id;
      if (id != null) { baseId = id; break; }
    }
    if (baseId == null) throw new Error('no base_id');

    // Step 2: fetch images for this exercise base
    const imgData = await apiFetch(
      `https://wger.de/api/v2/exerciseimage/?exercise_base=${baseId}&format=json`
    );

    const images = (imgData.results || []).filter(i => i.image);
    if (images.length === 0) throw new Error('no images');

    // Show the first image — img tags are never CORS-blocked so this always renders
    const imgUrl = images[0].image;
    container.innerHTML = `
      <img src="${imgUrl}"
           alt="${liftName} demonstration"
           style="display:block;width:100%;max-height:300px;object-fit:contain;background:#0a0a0a;padding:16px;"
           onerror="this.parentElement.innerHTML='<div class=\\'exercise-demo-placeholder\\'><span>🏋️</span><p>Demo not available for this exercise</p></div>'">
      <div style="text-align:center;padding:8px 0 10px;font-size:11px;letter-spacing:1px;color:#444;">
        Source: wger.de Open Exercise Database
      </div>`;

  } catch (_) {
    // Silently fall back to placeholder
    container.innerHTML = `
      <div class="exercise-demo-placeholder">
        <span>🏋️</span>
        <p>No demo available for this exercise</p>
      </div>`;
  }
}

function round25(v) { return Math.round(v / 2.5) * 2.5; }
function fmt(v) { return v % 1 === 0 ? String(v) : v.toFixed(1); }

// Epley 1RM formula
function epley(w, r) { return round25(w * (1 + r / 30)); }

// Flatten all exercises from the lifts object (deduped, preserving metadata)
function getAllExercises() {
  const seen = new Set();
  const all  = [];
  for (const area of Object.keys(lifts)) {
    for (const mov of Object.keys(lifts[area])) {
      for (const type of Object.keys(lifts[area][mov])) {
        for (const name of lifts[area][mov][type]) {
          if (!seen.has(name)) {
            seen.add(name);
            all.push({ name, area, mov, type });
          }
        }
      }
    }
  }
  return all;
}

// Handle live search on the home screen
function handleSearch(e) {
  const q         = e.target.value.trim().toLowerCase();
  const resultsEl = document.getElementById('searchResults');
  if (!resultsEl) return;
  if (!q) { resultsEl.innerHTML = ''; return; }

  const matches = getAllExercises().filter(ex => ex.name.toLowerCase().includes(q)).slice(0, 12);

  if (matches.length === 0) {
    resultsEl.innerHTML = '<div class="no-results">No exercises found — try a different term.</div>';
    return;
  }

  resultsEl.innerHTML = matches.map(ex => `
    <div class="lift-item" style="cursor:pointer;"

         data-search-mov="${ex.mov}" data-search-type="${ex.type}">

      </div>
      <span class="lift-arrow">→</span>
    </div>`).join('');

  resultsEl.querySelectorAll('[data-search-name]').forEach(el => {
    el.addEventListener('click', () => {
      state.lift      = el.dataset.searchName;

      render();

  });
}

// Generate week labels that scale with any programme length
function buildWeekLabels(n) {
  if (n === 1) return ['Max Effort'];
  if (n === 2) return ['Foundation', 'Peak'];
  if (n === 3) return ['Foundation', 'Build', 'Peak'];
  if (n === 4) return ['Foundation', 'Build', 'Overload', 'Peak'];
  if (n === 5) return ['Foundation', 'Build', 'Progress', 'Overload', 'Peak'];
  if (n === 6) return ['Foundation', 'Build', 'Progress', 'Overload', 'Peak', 'Max Effort'];
  // 7+ weeks: bookend with Foundation/Max Effort, number the middle
  const labels = ['Foundation', 'Build'];
  for (let i = 3; i <= n - 2; i++) labels.push(`Week ${i}`);
  labels.push('Peak', 'Max Effort');
  return labels;
}

// ── Rendering ──────────────────────────────────────────
const TOTAL_DOTS = 7;

function dots(active) {
  const segments = Array.from({length: TOTAL_DOTS}, (_, i) => {
    const cls = i + 1 === active ? 'current' : i + 1 < active ? 'done' : '';
    return `<div class="progress-segment ${cls}"></div>`;
  }).join('');
  return `
    <div class="progress-wrap">
      <div class="progress-label">Step <span>${active}</span> of ${TOTAL_DOTS}</div>
      <div class="progress-segments">${segments}</div>
    </div>`;
}

function render() {
  const app = document.getElementById('app');
  let html = '';
  if (state.inLibrary) {
    html = state.libraryCategory ? renderLibraryCategory() : renderLibrary();
  } else {
    html = dots(state.step);
    switch (state.step) {
      case 1: html += step1(); break;
      case 2: html += step2(); break;
      case 3: html += step3(); break;
      case 4: html += step4(); break;
      case 5: html += step5(); break;
      case 6: html += step6(); break;
      case 7: html += step7(); break;
    }
  }
  app.innerHTML = html;
  wireEvents();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

    <div class="input-card">
      <div class="input-label">Weight Unit</div>
      <div class="unit-toggle">
        <button class="unit-btn ${state.unit==='kg'?'active':''}" data-a="unit" data-v="kg">KG</button>
        <button class="unit-btn ${state.unit==='lbs'?'active':''}" data-a="unit" data-v="lbs">LBS</button>
      </div>
      <div class="input-label">What are you currently lifting?</div>
      <div class="inputs-row" style="grid-template-columns:1fr 1fr;">
        <div class="input-group">
          <input class="num-input" id="iReps" type="number" placeholder="10" value="${state.reps}" min="1" max="30">
          <span class="input-unit-label">Reps</span>
        </div>
        <div class="input-group">
          <input class="num-input" id="iWeight" type="number" placeholder="60" value="${state.weight}" min="1">
          <span class="input-unit-label">${u}</span>
        </div>
      </div>
    </div>
    <div class="or-divider">OR</div>
    <div class="direct-link" data-a="toggleDirect">
      <span class="direct-link-text"><strong>Already know your 1RM?</strong> Enter it directly to skip the calculation.</span>
      <a>Enter directly →</a>
    </div>
    <button class="calc-btn" data-a="calculate">CALCULATE MY ESTIMATED REPS &amp; WEIGHTS →</button>
    <p class="err-msg" id="errMsg"></p>`;
}

// Step 6 — Training systems dashboard
function step6() {
  const rm = state.oneRM;
  const u  = state.unit;

  // Unified training zones + rep ranges table
  // Percentages aligned to match the training systems below:
  // Ascend Pyramid: 60@15r, 67@12r, 75@10r, 80@8r, 85@6r
  // Percentage Training Cycle (PTC): 90@3r, 100@1r
  const unifiedZones = [
    { pct: 60,   reps: 15, color: '#3b82f6', name: 'Endurance / High Volume' },
    { pct: 67,   reps: 12, color: '#6366f1', name: 'Hypertrophy — Volume Training' },
    { pct: 75,   reps: 10, color: '#8b5cf6', name: 'Hypertrophy — Progressive Load' },
    { pct: 80,   reps: 8,  color: '#f59e0b', name: 'Strength-Hypertrophy' },
    { pct: 85,   reps: 6,  color: '#f97316', name: 'Strength Development' },
    { pct: 85,   reps: 5,  color: '#ef4444', name: 'Peaking / Heavy Strength' },
    { pct: 90,   reps: 3,  color: '#dc2626', name: 'Max Effort / Near-Failure' },
    { pct: 100,  reps: 1,  color: '#991b1b', name: '1 Rep Max' },
  ];
  const unifiedRows = unifiedZones.map(z => {
    const w = round25(rm * z.pct / 100);
    const repsLabel = z.reps === 1 ? '1 rep' : `${z.reps} reps`;
    return `<div class="zone-row">
      <div class="zone-dot" style="background:${z.color}"></div>
      <div class="zone-pct" style="color:${z.color}">${z.pct}%</div>
      <div class="zone-reps">${repsLabel}</div>
      <div class="zone-weight">${fmt(w)} ${u}</div>
      <div class="zone-name">${z.name}</div>
    </div>`;
  }).join('');

  // All four training systems
  const sysData = [
    {
      key: 'ascend', name: 'Ascend Pyramid', color: '#f59e0b',
      desc: '15 → 12 → 10 → 8 → 6 reps',
      sets: [{reps:15,pct:60},{reps:12,pct:67},{reps:10,pct:75},{reps:8,pct:80},{reps:6,pct:85}],
    },
    {
      key: 'reverse', name: 'Reverse Pyramid', color: '#8b5cf6',
      desc: '6 → 8 → 10 → 12 → 15 reps',
      sets: [{reps:6,pct:85},{reps:8,pct:80},{reps:10,pct:75},{reps:12,pct:67},{reps:15,pct:60}],
    },
    {
      key: '5x5', name: '5x5 Strength Training', color: '#3b82f6',
      desc: '5 sets · 5 reps · same weight',
      sets: [{reps:5,pct:85},{reps:5,pct:85},{reps:5,pct:85},{reps:5,pct:85},{reps:5,pct:85}],
    },
    {
      key: 'cycle', name: 'Percentage Training Cycle (PTC)', color: '#e74c3c',
      desc: 'Progressive strength peaking',
      sets: [
        {reps:10,pct:70,label:'Wk 1'},{reps:8,pct:75,label:'Wk 2'},
        {reps:6,pct:80,label:'Wk 3'},{reps:5,pct:85,label:'Wk 4'},
        {reps:3,pct:90,label:'Wk 5'},{reps:1,pct:100,label:'Wk 6'},
      ],
    },
  ];

  const systemCards = sysData.map(sys => {
    const rows = sys.sets.map((s, i) => {
      const w     = round25(rm * s.pct / 100);
      const label = sys.key === 'cycle' ? s.label : `Set ${i+1}`;
      return `<div class="system-set-row">
        <span class="set-label">${label}</span>
        <span class="set-reps">${s.reps} reps</span>
        <span class="set-weight" style="color:${sys.color}">${fmt(w)} ${u}</span>
      </div>`;
    }).join('');
    return `<div class="system-card">
      <div class="system-card-header">
        <div class="system-color-bar" style="background:${sys.color}"></div>
        <div>
          <div class="system-name" style="color:${sys.color}">${sys.name}</div>
          <div class="system-desc">${sys.desc}</div>
        </div>
      </div>
      ${rows}
    </div>`;
  }).join('');

  return `
    <div class="back-link" data-a="recalc">← Recalculate</div>
    <div class="result-lift-name">${state.lift.toUpperCase()}</div>
    <div class="result-1rm">
      <span class="big-num">${fmt(rm)}</span><span class="unit-tag"> ${u}</span>
    </div>
    <div class="result-1rm-label">Estimated 1 Rep Max</div>
    <div class="result-1rm-note">Estimated via Epley formula. Confirm on test day.</div>
    <div class="divider"></div>
    <div class="zones-card">
      <div class="zones-title">Training Zones &amp; Estimated Weight Per Rep Range</div>
      ${unifiedRows}
    </div>
    <div class="divider"></div>
    <div class="section-heading">Your Numbers Across All Training Systems</div>
    <div class="section-sub">${state.lift} · Based on estimated 1RM of ${fmt(rm)} ${u}</div>
    <div class="systems-grid">${systemCards}</div>
    <button class="calc-btn" data-a="genProg" style="margin-bottom:16px;">
      📅 GENERATE MY NUMBERS TO PLAN MY TRAINING SESSIONS →
    </button>
    <div class="action-buttons">
      <button class="btn-print" data-a="print">🖨️ PRINT / SAVE PDF</button>
      <button class="btn-new" data-a="restart">+ NEW LIFT</button>
    </div>`;
}

// Step 7 — Week-by-week programme
function step7() {
  const rm  = state.oneRM;
  const u   = state.unit;
  const sys = state.selectedSystem;
  const inc = state.unit === 'kg' ? 2.5 : 5;

  const n = state.programWeeks;

  const tabs = [
    { key: 'ascend',  label: 'Ascend Pyramid' },
    { key: 'reverse', label: 'Reverse Pyramid' },
    { key: '5x5',     label: '5x5 Strength Training' },
    { key: 'cycle',   label: 'Percentage Training Cycle (PTC)' },
  ];

  const tabsHtml = tabs.map(t => `
    <button class="prog-tab ${sys === t.key ? 'active' : ''}" data-a="selectSystem" data-v="${t.key}">
      ${t.label}
    </button>`).join('');

  let weeks = [];

  if (sys === 'ascend') {
    const base = [{reps:15,pct:60},{reps:12,pct:67},{reps:10,pct:75},{reps:8,pct:80},{reps:6,pct:85}];
    const wkLabels = buildWeekLabels(n);
    weeks = wkLabels.map((lbl, wi) => ({
      label: lbl,
      note: wi > 0 ? `+${inc * wi}${u} from base` : 'Base weights',
      cls: wi >= n - 2 ? 'pw-red' : '',
      rows: base.map((s, si) => ({
        label: `Set ${si+1}`, reps: `${s.reps} reps`,
        weight: round25(rm * s.pct / 100 + inc * wi), green: false,
      })),
    }));
  } else if (sys === 'reverse') {
    const base = [{reps:6,pct:85},{reps:8,pct:80},{reps:10,pct:75},{reps:12,pct:67},{reps:15,pct:60}];
    const wkLabels = buildWeekLabels(n);
    weeks = wkLabels.map((lbl, wi) => ({
      label: lbl,
      note: wi > 0 ? `+${inc * wi}${u} from base` : 'Base weights',
      cls: wi >= n - 2 ? 'pw-red' : '',
      rows: base.map((s, si) => ({
        label: `Set ${si+1}`, reps: `${s.reps} reps`,
        weight: round25(rm * s.pct / 100 + inc * wi), green: false,
      })),
    }));
  } else if (sys === '5x5') {
    const wkLabels = buildWeekLabels(n);
    weeks = wkLabels.map((lbl, wi) => {
      const pct = Math.round((75 + (wi / Math.max(n - 1, 1)) * 15) * 2) / 2;
      return {
        label: lbl,
        note: `${pct}% 1RM`,
        cls: wi >= n - 2 ? 'pw-red' : '',
        rows: Array.from({length: 5}, (_, si) => ({
          label: `Set ${si+1}`, reps: '5 reps',
          weight: round25(rm * pct / 100), green: false,
        })),
      };
    });
  } else {
    // 6-week strength cycle
    weeks = program.map((w, i) => {
      const isLast = i === 5;
      const wgt    = round25(rm * w.pct / 100);
      return {
        label: isLast ? '1 Rep Max Test' : w.name,
        note: `${w.pct}% 1RM`,
        cls: w.cls === 'hl-red' ? 'pw-red' : w.cls === 'hl-green' ? 'pw-green' : '',
        rows: [{
          label: isLast ? 'Test' : `${w.sets} sets`,
          reps: isLast ? '1 rep max' : `${w.reps} reps`,
          weight: wgt,
          green: isLast,
          prefix: isLast ? 'Target ' : '',
          suffix: isLast ? '+' : '',
        }],
      };
    });
  }

  // Append deload week to every system
  const deloadWeight = round25(rm * 0.5 / 100 * 100); // 50% 1RM
  const deloadRows = sys === 'ascend'
    ? [{reps:15,pct:60},{reps:12,pct:67},{reps:10,pct:75},{reps:8,pct:80},{reps:6,pct:85}]
        .map((s, si) => ({ label: `Set ${si+1}`, reps: `${s.reps} reps`, weight: round25(rm * 0.5 * s.pct / 100 * 2), green: true }))
    : sys === 'reverse'
    ? [{reps:6,pct:85},{reps:8,pct:80},{reps:10,pct:75},{reps:12,pct:67},{reps:15,pct:60}]
        .map((s, si) => ({ label: `Set ${si+1}`, reps: `${s.reps} reps`, weight: round25(rm * 0.5 * s.pct / 100 * 2), green: true }))
    : sys === '5x5'
    ? Array.from({length: 5}, (_, si) => ({ label: `Set ${si+1}`, reps: '5 reps', weight: round25(rm * 0.5), green: true }))
    : [{ label: 'All Sets', reps: '5–10 reps', weight: round25(rm * 0.5), green: true, prefix: '', suffix: '' }];

  weeks.push({
    label: 'Deload Week 🟢',
    note: '50% 1RM — Active Recovery',
    cls: 'pw-green',
    rows: deloadRows,
  });

  // Build plain-text copy string for phone notes
  const sysName = tabs.find(t => t.key === sys)?.label || sys;
  let copyText = `🏋️ ${state.lift.toUpperCase()} — ${sysName.toUpperCase()}\n`;
  copyText += `Estimated 1RM: ${fmt(rm)} ${u}  |  ${n} Weeks + Deload\n`;
  copyText += `━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n`;
  weeks.forEach((wk, wi) => {
    copyText += `WEEK ${wi + 1} — ${wk.label}`;
    if (wk.note) copyText += ` (${wk.note})`;
    copyText += `\n`;
    wk.rows.forEach(r => {
      copyText += `  ${r.label}:  ${r.reps}  ·  ${r.prefix || ''}${fmt(r.weight)} ${u}${r.suffix || ''}\n`;
    });
    copyText += `\n`;
  });
  copyText += `━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
  copyText += `Coach Nikos · Strength & Performance Hub`;
  window._progCopyText = copyText;

  const weeksHtml = weeks.map((wk, wi) => {
    const rowsHtml = wk.rows.map(r => `
      <div class="prog-set-row">
        <span class="prog-set-label">${r.label}</span>
        <span class="prog-set-reps">${r.reps}</span>
        <span class="prog-set-weight ${r.green ? 'green' : ''}">${r.prefix || ''}${fmt(r.weight)} ${u}${r.suffix || ''}</span>
      </div>`).join('');
    return `<div class="prog-week ${wk.cls}">
      <div class="prog-week-header">
        <span class="prog-week-num">Week ${wi+1}</span>
        <span class="prog-week-label">${wk.label} <span style="color:#555;font-weight:500;">— ${wk.note}</span></span>
      </div>
      ${rowsHtml}
    </div>`;
  }).join('');

  const totalWeeks = 6;

  return `
    <div class="back-link" data-a="back">← Back to Systems</div>
    <h2 class="step-title" style="text-align:center;margin-bottom:6px;">${state.lift}</h2>
    <p style="text-align:center;font-size:13px;font-weight:700;letter-spacing:3px;color:#e74c3c;text-transform:uppercase;margin-bottom:10px;">Your Estimated Progressive Overload Numbers</p>
    <p style="text-align:center;font-size:13px;color:#555;margin-bottom:20px;">Estimated 1RM: <strong style="color:#888;">${fmt(rm)} ${u}</strong></p>
    <div style="background:#141414;border:1px solid #242424;border-radius:14px;padding:20px 24px;margin-bottom:28px;">
      <p style="font-size:14px;color:#888;line-height:1.7;text-align:center;">
        Select the training system below based on what Coach Nikos has prescribed on your current programme. Follow these numbers consistently over the next few weeks to ensure we stay on track and hit your targets.
      </p>
    </div>
    <div class="weeks-picker">
      <p class="weeks-picker-label"><strong>How many weeks is your current programme?</strong><br>We'll customise every training system to match your programme length.</p>
      <div class="weeks-picker-controls">
        <button class="weeks-btn" data-a="decrWeeks">−</button>
        <div>
          <div class="weeks-display">${n}</div>
          <div class="weeks-display-unit">weeks</div>
        </div>
        <button class="weeks-btn" data-a="incrWeeks">+</button>
      </div>
      <p class="weeks-picker-note">Min 2 weeks · Max 12 weeks · + Deload week included</p>
    </div>
    <div class="prog-tabs">${tabsHtml}</div>
    ${weeksHtml}
    <div class="copy-notes-card">
      <div class="copy-notes-title">📋 Save to Your Phone Notes</div>
      <p class="copy-notes-sub">Tap the button below to copy your full programme as plain text — then paste it straight into your Notes app. No printing, no downloading.</p>
      <div class="copy-preview">${copyText}</div>
      <button class="btn-copy" id="copyBtn" data-a="copyProg">📋 COPY PROGRAMME TO CLIPBOARD →</button>
    </div>
    <div class="action-buttons" style="margin-top:16px;">
      <button class="btn-print" data-a="print">🖨️ PRINT / SAVE PDF</button>
      <button class="btn-new" data-a="restart">+ NEW LIFT</button>
    </div>`;
}

// ── Events ─────────────────────────────────────────────
function wireEvents() {
  document.querySelectorAll('[data-a]').forEach(el => {
    el.addEventListener('click', onAction);
  });
  const s  = document.getElementById('iSets');
  const r  = document.getElementById('iReps');
  const w  = document.getElementById('iWeight');
  const d  = document.getElementById('iDirect');
  const sx = document.getElementById('exSearch');
  if (s)  s.addEventListener('input',  e => { state.sets = e.target.value; });
  if (r)  r.addEventListener('input',  e => { state.reps   = e.target.value; });
  if (w)  w.addEventListener('input',  e => { state.weight = e.target.value; });
  if (d)  d.addEventListener('input',  e => { state.weight = e.target.value; });
  if (sx) sx.addEventListener('input', handleSearch);
}

function showErr(msg) {
  const el = document.getElementById('errMsg');
  if (el) el.textContent = msg;
}

function onAction(e) {
  const el = e.currentTarget;
  const a  = el.dataset.a;
  const v  = el.dataset.v;

  switch (a) {
    case 'bodyArea':
      state.bodyArea = v; state.step = 2; break;

    case 'movement':
      state.movement = v; state.step = 3; break;

    case 'type':
      state.type = v; state.step = 4; break;

    case 'lift':
      state.lift = v; state.directEntry = false;
      state.sets = ''; state.reps = ''; state.weight = '';
      state.step = 5; break;

    case 'unit':
      state.unit = v; render(); return;

    case 'toggleDirect':
      state.directEntry = !state.directEntry;
      state.weight = ''; render(); return;

    case 'calculate': {
      const reps   = parseFloat(state.reps);
      const weight = parseFloat(state.weight);
      if (!weight || weight <= 0) { showErr('Please enter the weight you lifted.'); return; }
      if (!reps   || reps   <= 0) { showErr('Please enter the number of reps.');    return; }
      // If reps = 1, that weight IS the 1RM — no formula needed
      state.oneRM = reps === 1 ? round25(weight) : epley(weight, reps);
      state.step = 6; break;
    }

    case 'calcDirect': {
      const weight = parseFloat(state.weight);
      if (!weight || weight <= 0) { showErr('Please enter your 1RM.'); return; }
      state.oneRM = round25(weight);
      state.step = 6; break;
    }

    case 'back':
      if (state.step > 1) {
        state.step--;
        state.directEntry = false;
      }
      break;

    case 'recalc':
      state.step = 5;
      state.sets = ''; state.reps = ''; state.weight = '';
      state.directEntry = false; break;

    case 'genProg':
      state.selectedSystem = 'ascend';
      state.step = 7; break;

    case 'selectSystem':
      state.selectedSystem = v;
      render(); return;

    case 'incrWeeks':
      if (state.programWeeks < 12) state.programWeeks++;
      render(); return;

    case 'decrWeeks':
      if (state.programWeeks > 2) state.programWeeks--;
      render(); return;

    case 'restart':
      Object.assign(state, {
        step: 1, bodyArea: null, movement: null, type: null, lift: null,
        unit: 'kg', sets: '', reps: '', weight: '', oneRM: null,
        directEntry: false, selectedSystem: 'ascend', programWeeks: 6,
        inLibrary: false, libraryCategory: null
      }); break;

    case 'openRecording':
      // 👇 Replace this URL with your actual recording link
      window.open('https://drive.google.com/file/d/1Fql1JRqQSc3bqIDa5a9qMigQk9cpIn55/view?usp=drive_link', '_blank'); return;

    case 'openLibrary':
      state.inLibrary = true; state.libraryCategory = null; break;

    case 'libCategory':
      state.libraryCategory = v; break;

    case 'libBack':
      state.inLibrary = false; state.libraryCategory = null; break;

    case 'libBackCat':
      state.libraryCategory = null; break;

    case 'copyProg': {
      const text = window._progCopyText || '';
      const btn = document.getElementById('copyBtn');
      navigator.clipboard.writeText(text).then(() => {
        if (btn) {
          btn.textContent = '✅ COPIED! PASTE INTO YOUR NOTES APP';
          btn.classList.add('copied');
          setTimeout(() => {
            btn.textContent = '📋 COPY PROGRAMME TO CLIPBOARD →';
            btn.classList.remove('copied');
          }, 3000);
        }
      }).catch(() => {
        if (btn) btn.textContent = '⚠️ Copy not supported — please use Print instead';
      });
      return;
    }

    case 'print':
      window.print(); return;
  }

  render();
}

// ── Boot ───────────────────────────────────────────────
render();

// ── Register Service Worker (PWA) ──────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  });
}

</script>
